<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LYFE{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script>
        (function () {
            let lastScrollY = 0;
    
            document.body.addEventListener("htmx:beforeRequest", function (event) {
                const elt = event.detail.elt;
                if (elt && (elt.classList.contains("preserve-scroll") || elt.closest(".preserve-scroll"))) {
                    lastScrollY = window.scrollY;
                }
            });
    
            document.body.addEventListener("htmx:afterSwap", function () {
                if (typeof lastScrollY === "number") {
                    window.scrollTo({ top: lastScrollY, behavior: "auto" });
                }
            });
        })();
    </script>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1100px;
            margin: 0 auto;
            padding: 24px;
            line-height: 1.5;
        }
        nav {
            margin-bottom: 24px;
        }
        nav a {
            margin-right: 16px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 8px;
            text-align: left;
            vertical-align: top;
        }
        .actions {
            margin: 16px 0;
        }
        .form-row {
            margin-bottom: 12px;
        }
        .errorlist {
            color: #b00020;
        }
        .muted {
            color: #666;
        }
        .card {
            border: 1px solid #ccc;
            padding: 16px;
            margin: 16px 0;
        }
        ul {
            padding-left: 20px;
        }
        button {
            cursor: pointer;
        }
        .inline-form {
            margin-top: 12px;
            padding: 12px;
            border: 1px dashed #bbb;
        }
        .danger {
            color: #b00020;
        }
        input, select, textarea {
            width: 100%;
            box-sizing: border-box;
        }
        .errorlist {
            color: #b00020;
            margin: 4px 0;
        }

        input:invalid, select:invalid {
        border: 1px solid #b00020;
        }
    </style>
</head>
<body>
    <nav>
        <a href="{% url 'fitness:exercise-list' %}">Exercises</a>
        <a href="{% url 'fitness:pool-list' %}">Pools</a>
        <a href="{% url 'fitness:session-list' %}">Sessions</a>
        <a href="{% url 'admin:index' %}">Admin</a>
    </nav>

    {% if request.user.is_authenticated %}
        <p class="muted">Logged in as: {{ request.user.username }}</p>
    {% endif %}

    {% block content %}{% endblock %}
</body>
</html>
