<div class="card">
    <h2>Session Header</h2>

    <form
        method="post"
        hx-post="{% url 'fitness:htmx-session-update-header' session.pk %}"
        hx-target="#session-header"
        hx-swap="outerHTML"
        class="preserve-scroll"
    >
        {% csrf_token %}

        {% for field in header_form %}
            <div class="form-row">
                <div>{{ field.label_tag }}</div>
                <div>{{ field }}</div>
                {% if field.help_text %}
                    <div class="muted">{{ field.help_text }}</div>
                {% endif %}
                {{ field.errors }}
            </div>
        {% endfor %}

        <button type="submit">Save session header</button>
    </form>
</div>
