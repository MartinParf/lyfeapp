<div class="card">
    <h2>Session Header</h2>

    <form
        method="post"
        hx-post="{% url 'fitness:htmx-session-update-header' session.pk %}"
        hx-target="#session-header"
        hx-swap="outerHTML"
        class="preserve-scroll"
    >
        {% csrf_token %}

        {% for field in header_form %}
            <div class="form-row">
                <div>{{ field.label_tag }}</div>
                <div>{{ field }}</div>
                {% if field.help_text %}
                    <div class="muted">{{ field.help_text }}</div>
                {% endif %}
                {{ field.errors }}
            </div>
        {% endfor %}

        <button type="submit">Save session header</button>
    </form>
    
    <form
        method="post"
        action="{% url 'fitness:session-clone' session.pk %}"
        style="margin-top: 12px;"
    >
        {% csrf_token %}
        <button type="submit">Clone session</button>
    </form>

    <hr style="margin: 16px 0;">

    <form
        method="post"
        action="{% url 'fitness:session-delete' session.pk %}"
        onsubmit="return confirm('Delete this workout session?');"
    >
        {% csrf_token %}
        <button type="submit" class="danger">Delete session</button>
    </form>
</div>
