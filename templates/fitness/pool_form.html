{% extends "base.html" %}

{% block title %}Create Pool | LYFE{% endblock %}

{% block content %}
<h1>Create Exercise Pool</h1>

<form method="post">
    {% csrf_token %}
    {% for field in form %}
        <div class="form-row">
            <div>{{ field.label_tag }}</div>
            <div>{{ field }}</div>
            {% if field.help_text %}
                <div class="muted">{{ field.help_text }}</div>
            {% endif %}
            {{ field.errors }}
        </div>
    {% endfor %}
    <button type="submit">Save pool</button>
</form>
{% endblock %}
